services:

  mysql:
    image: mysql:8.0
    container_name: chat56400_mysql
    restart: unless-stopped
    ports:
      - "56401:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_S3cur3P@ss_2024
      MYSQL_DATABASE:      chat56400_db
      MYSQL_USER:          chat56400_user
      MYSQL_PASSWORD:      chat56400_P@ssw0rd_2024
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - chat56400_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_S3cur3P@ss_2024"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer:latest
    container_name: chat56400_adminer
    restart: unless-stopped
    ports:
      - "56402:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    networks:
      - chat56400_net
    depends_on:
      mysql:
        condition: service_healthy

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: chat56400_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    environment:
      DB_HOST:     mysql
      DB_PORT:     3306
      DB_DATABASE: chat56400_db
      DB_USERNAME: chat56400_user
      DB_PASSWORD: chat56400_P@ssw0rd_2024
    networks:
      - chat56400_net
    depends_on:
      mysql:
        condition: service_healthy

  node:
    build:
      context: ./node
      dockerfile: ../docker/node/Dockerfile
    container_name: chat56400_node
    restart: unless-stopped
    environment:
      WS_PORT: 3000
    networks:
      - chat56400_net
    depends_on:
      - php

  nginx:
    image: nginx:alpine
    container_name: chat56400_nginx
    restart: unless-stopped
    ports:
      - "56400:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - chat56400_net
    depends_on:
      - php
      - node

networks:
  chat56400_net:
    driver: bridge

volumes:
  mysql_data:
    driver: local
