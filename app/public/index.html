<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat 56400</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 680px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: #16213e;
        }

        header {
            padding: 14px 20px;
            background: #0f3460;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 {
            font-size: 1rem;
            font-weight: 600;
        }

        #status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e74c3c;
            flex-shrink: 0;
        }

        #status.online {
            background: #2ecc71;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            line-height: 1.4;
            word-break: break-word;
        }

        .msg .meta {
            font-size: 0.72rem;
            opacity: 0.6;
            margin-bottom: 3px;
        }

        .msg.other {
            background: #2ce74b;
            color: #000000;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg.self {
            background: #c9b441;
            color: #000000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        #form-area {
            padding: 12px 16px;
            background: #0f3460;
            display: flex;
            gap: 8px;
        }

        input {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 8px 12px;
            font-size: 0.9rem;
            outline: none;
        }

        input:focus {
            border-color: #e94560;
        }

        #inp-name {
            width: 120px;
            flex-shrink: 0;
        }

        #inp-msg {
            flex: 1;
        }

        button {
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        button:hover {
            background: #c73652;
        }

        button:disabled {
            opacity: 0.4;
            cursor: default;
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <div id="status"></div>
            <h1>Chat 56400</h1>
        </header>

        <div id="messages"></div>

        <div id="form-area">
            <input id="inp-name" type="text" placeholder="Seu nome" maxlength="50">
            <input id="inp-msg" type="text" placeholder="Mensagem..." maxlength="1000">
            <button id="btn-send">Enviar</button>
        </div>
    </div>

    <script src="chat.js"></script>
</body>

</html>
